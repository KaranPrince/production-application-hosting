global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http
    bind *:80
    redirect scheme https unless { ssl_fc }

frontend https
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/pah.local.pem

    acl host_frontend hdr(host) -i frontend.pah.local
    acl host_api hdr(host) -i api.pah.local
    acl host_admin hdr(host) -i admin.pah.local

    use_backend frontend_backend if host_frontend
    use_backend api_backend if host_api
    use_backend admin_backend if host_admin

    default_backend frontend_backend

backend frontend_backend
    option httpchk GET /
    http-check expect status 200
    server frontend frontend:80 check inter 5s fall 3 rise 2

backend api_backend
    option httpchk GET /health
    http-check expect status 200
    server api api:8080 check

backend admin_backend
    option httpchk GET /
    http-check expect status 200
    server admin admin:80 check inter 5s fall 3 rise 2

listen stats
    bind *:8404

    mode http

    stats enable

    stats uri /

    stats refresh 5s

    stats show-node

    stats show-legends
